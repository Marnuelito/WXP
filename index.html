<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Escritorio XP</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <!-- Estilos -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/windows.css">
  <link rel="stylesheet" href="css/desktop.css">
  <link rel="stylesheet" href="css/taskbar.css">
  <link rel="stylesheet" href="css/vlc.css">
  <link rel="stylesheet" href="css/paint.css">
  <link rel="stylesheet" href="css/paint-dialogs.css">
  <link rel="stylesheet" href="css/mypictures.css">
  <link rel="stylesheet" href="css/gallery.css">
  <link rel="stylesheet" href="css/scrollbars.css">
</head>
<body>

  <!-- ================= ÍCONOS DEL ESCRITORIO ================= -->
  <div class="icono" style="top: 20px; left: 20px;">
    <img src="https://i.imgur.com/L0hTIXE.png">
    <p>Papelera</p>
  </div>

  <div class="icono" style="top: 120px; left: 20px;" ondblclick="abrirVentanaNativa('paint')">
    <img src="https://i.imgur.com/qWETjsV.png">
    <p>Paint</p>
  </div>

  <div class="icono" style="top: 220px; left: 20px;" ondblclick="abrirVentanaNativa('vlc-nativo')">
    <img src="https://i.imgur.com/wkLrNnm.png">
    <p>VLC media player</p>
  </div>

  <div class="icono" style="top: 320px; left: 20px;" ondblclick="abrirVentanaNativa('prueba')">
    <img src="https://i.imgur.com/wkLrNnm.png">
    <p>Bloc de notas</p>
  </div>

  <div class="icono" style="top: 420px; left: 20px;" ondblclick="abrirVentanaNativa('mypictures')">
    <img src="https://i.imgur.com/5B3dJrk.png">
    <p>My Pictures</p>
  </div>

  <!-- ================= BARRA DE TAREAS ================= -->
  <div class="barra-tareas">
    <button class="boton-inicio">
      <img class="logo-windows" src="https://i.imgur.com/IUejoaq.png" alt="Windows">
      <span style="margin-left: 2px;">start</span>
    </button>
    <div class="tareas-ventanas"></div>
    <div class="bandeja-sistema">
      <div class="reloj" id="reloj" title="">
        <span id="relojHora">10:31 AM</span>
        <span id="relojFecha">15/01/2025</span>
      </div>
    </div>
  </div>

  <!-- ================= SCRIPTS (ORDEN IMPORTANTE) ================= -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/windows.js"></script>
  <script src="js/taskbar.js"></script>
  <script src="js/desktop.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/vlc.js"></script>

  <!-- Loader de componentes (carga ventanas y diálogos dinámicamente) -->
  <script src="js/components-loader.js"></script>

  <script src="js/paint-core.js"></script>
  <script src="js/paint-tools.js"></script>
  <script src="js/paint-shapes.js"></script>
  <script src="js/paint-text.js"></script>
  <script src="js/paint-selection.js"></script>
  <script src="js/paint-history.js"></script>
  <script src="js/paint-file.js"></script>
  <script src="js/paint-dialogs.js"></script>
  <script src="js/paint-menus.js"></script>
  <script src="js/paint-options.js"></script>

  <script src="js/firebase-init.js"></script>
  <script src="js/gallery.js"></script>

  <script src="js/init.js"></script>

</body>
</html>
